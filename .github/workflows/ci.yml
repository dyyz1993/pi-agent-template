name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint root
        run: bun run lint

      - name: Install & lint all templates
        run: |
          for t in general chat agent; do
            cd $GITHUB_WORKSPACE/templates/$t
            bun install
            bun run lint
          done

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (root)
        run: bun run type-check

      - name: Type check all templates
        run: |
          for t in general chat agent; do
            cd $GITHUB_WORKSPACE/templates/$t
            bun install
            ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
            if [ -n "$ERRORS" ]; then
              echo "=== $t type-check FAILED ==="
              echo "$ERRORS"
              exit 1
            fi
            echo "=== $t type-check passed ==="
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rpc-core tests
        run: bun run test:rpc

  template-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install & test all templates
        run: |
          for t in agent chat general; do
            cd $GITHUB_WORKSPACE/templates/$t
            bun install
            npx vitest run
          done

  build-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [general, chat, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Create ${{ matrix.template }} project from template
        run: HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-${{ matrix.template }} --type ${{ matrix.template }}

      - name: Verify project structure
        run: |
          cd /tmp/ci-test-${{ matrix.template }}
          echo "=== Checking project structure ==="
          test -f package.json || (echo "FAIL: package.json missing" && exit 1)
          test -f src/server.ts || (echo "FAIL: src/server.ts missing" && exit 1)
          test -f src/mainview/main.tsx || (echo "FAIL: src/mainview/main.tsx missing" && exit 1)
          test -f vite.config.ts || (echo "FAIL: vite.config.ts missing" && exit 1)
          echo "=== Project structure OK ==="

      - name: Install dependencies
        run: |
          cd /tmp/ci-test-${{ matrix.template }}
          bun install

      - name: Build frontend
        run: |
          cd /tmp/ci-test-${{ matrix.template }}
          npx vite build

      - name: Verify build output
        run: |
          cd /tmp/ci-test-${{ matrix.template }}
          echo "=== Checking build output ==="
          test -d dist || (echo "FAIL: dist/ directory missing" && exit 1)
          test -f dist/index.html || (echo "FAIL: dist/index.html missing" && exit 1)
          echo "=== Build output OK ==="
          echo "=== Build artifacts ==="
          du -sh dist/
          du -sh dist/assets/*

  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [general, chat, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Run E2E integration test (${{ matrix.template }})
        run: bun run scripts/e2e-test.ts --type ${{ matrix.template }}

  e2e-ui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [general, chat, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E UI tests (${{ matrix.template }})
        run: bun run scripts/e2e-ui-test.ts ${{ matrix.template }}

      - name: Upload test results (${{ matrix.template }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-results-${{ matrix.template }}
          path: e2e-ui-results/
          retention-days: 7

  notify-result:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, template-test, build-verify, integration-test, e2e-ui]
    if: always()
    steps:
      - name: Check CI result
        id: check
        run: |
          if echo "${{ needs.lint.result }} ${{ needs.type-check.result }} ${{ needs.test.result }} ${{ needs.template-test.result }} ${{ needs.build-verify.result }} ${{ needs.integration-test.result }} ${{ needs.e2e-ui.result }}" | grep -q "failure"; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Bark notification
        run: |
          BRANCH="${GITHUB_REF_NAME:-unknown}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          STATUS="${{ steps.check.outputs.status }}"
          if [ "$STATUS" = "FAILED" ]; then
            TITLE="CI%E5%A4%B1%E8%B4%A5%E2%9D%8C"
          else
            TITLE="CI%E9%80%9A%E8%BF%87%E2%9C%85"
          fi
          MSG="${TITLE}%20${GITHUB_REPOSITORY}%20${BRANCH}%20${RUN_URL}"
          curl -s "https://api.day.app/PpdrqL9LsYaJc83YW5ZQj5/${MSG}" || true

  feishu-notify:
    name: Feishu Notification
    if: always()
    needs: [lint, type-check, test, template-test, build-verify, integration-test, e2e-ui, notify-result]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"lint":"${{ needs.lint.result }}","type-check":"${{ needs.type-check.result }}","test":"${{ needs.test.result }}","template-test":"${{ needs.template-test.result }}","build-verify":"${{ needs.build-verify.result }}","integration-test":"${{ needs.integration-test.result }}","e2e-ui":"${{ needs.e2e-ui.result }}","notify-result":"${{ needs.notify-result.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
