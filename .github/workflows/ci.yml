name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint root
        run: bun run lint

      - name: Install template dependencies (general)
        run: cd templates/general && bun install

      - name: Lint template (general)
        run: cd templates/general && bun run lint

      - name: Install template dependencies (chat)
        run: cd templates/chat && bun install

      - name: Lint template (chat)
        run: cd templates/chat && bun run lint

      - name: Install template dependencies (agent)
        run: cd templates/agent && bun install

      - name: Lint template (agent)
        run: cd templates/agent && bun run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (root)
        run: bun run type-check

      - name: Install template dependencies (general)
        run: cd templates/general && bun install

      - name: Type check (general)
        run: |
          cd templates/general
          ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
          if [ -n "$ERRORS" ]; then
            echo "$ERRORS"
            exit 1
          fi
          echo "Template type check passed"

      - name: Install template dependencies (chat)
        run: cd templates/chat && bun install

      - name: Type check (chat)
        run: |
          cd templates/chat
          ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
          if [ -n "$ERRORS" ]; then
            echo "$ERRORS"
            exit 1
          fi
          echo "Template type check passed"

      - name: Install template dependencies (agent)
        run: cd templates/agent && bun install

      - name: Type check (agent)
        run: |
          cd templates/agent
          ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
          if [ -n "$ERRORS" ]; then
            echo "$ERRORS"
            exit 1
          fi
          echo "Template type check passed"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rpc-core tests
        run: bun run test:rpc

  template-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install template dependencies (agent)
        run: cd templates/agent && bun install

      - name: Run agent template tests
        run: cd templates/agent && npx vitest run

      - name: Install template dependencies (chat)
        run: cd templates/chat && bun install

      - name: Run chat template tests
        run: cd templates/chat && npx vitest run

      - name: Install template dependencies (general)
        run: cd templates/general && bun install

      - name: Run general template tests
        run: cd templates/general && npx vitest run

  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Create project from template
        run: HUSKY=0 bun run create ci-test /tmp/ci-test

      - name: Verify project created
        run: test -f /tmp/ci-test/package.json

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Run E2E integration test
        run: bun run scripts/e2e-test.ts

  e2e-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E UI tests
        run: bun run test:e2e-ui

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-results
          path: e2e-ui-results/
          retention-days: 7

  notify-result:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, template-test, build-verify, integration-test, e2e-ui]
    if: always()
    steps:
      - name: Check CI result
        id: check
        run: |
          if echo "${{ needs.lint.result }} ${{ needs.type-check.result }} ${{ needs.test.result }} ${{ needs.template-test.result }} ${{ needs.build-verify.result }} ${{ needs.integration-test.result }} ${{ needs.e2e-ui.result }}" | grep -q "failure"; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Bark notification
        run: |
          BRANCH="${GITHUB_REF_NAME:-unknown}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          STATUS="${{ steps.check.outputs.status }}"
          if [ "$STATUS" = "FAILED" ]; then
            TITLE="CI%E5%A4%B1%E8%B4%A5%E2%9D%8C"
          else
            TITLE="CI%E9%80%9A%E8%BF%87%E2%9C%85"
          fi
          MSG="${TITLE}%20${GITHUB_REPOSITORY}%20${BRANCH}%20${RUN_URL}"
          curl -s "https://api.day.app/PpdrqL9LsYaJc83YW5ZQj5/${MSG}" || true
