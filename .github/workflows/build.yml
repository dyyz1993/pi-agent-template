name: Build & Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [agent, chat, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        run: |
          cd templates/${{ matrix.template }}
          bun run build

      - name: Verify build output
        run: |
          test -f templates/${{ matrix.template }}/dist/index.html
          test -d templates/${{ matrix.template }}/dist/assets

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.template }}
          path: templates/${{ matrix.template }}/dist/
          retention-days: 7

  # ── 桌面应用构建（Electrobun 跨平台）────────────────
  # Electrobun 当前主要支持 macOS，Windows/Linux 支持尚在开发中。
  # 使用 continue-on-error: true 容错，等 Electrobun 正式支持后移除。
  # macOS runner 计费是 Linux 的 10 倍，Windows runner 是 Linux 的 10 倍。
  # 本 job 仅在 main 分支或手动触发时运行，避免 PR 消耗过多资源。
  build-desktop:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            template: agent
          - platform: windows
            runner: windows-latest
            template: agent
          - platform: linux
            runner: ubuntu-latest
            template: agent
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend for desktop
        run: |
          cd templates/${{ matrix.template }}
          bun run build

      - name: Install template dependencies
        run: |
          cd templates/${{ matrix.template }}
          bun install

      - name: Build Electron desktop app (macos)
        if: matrix.platform == 'macos'
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:mac
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: Build Electron desktop app (windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:win
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: Build Electron desktop app (linux)
        if: matrix.platform == 'linux'
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:linux
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: Verify build artifacts (${{ matrix.platform }})
        run: |
          cd templates/${{ matrix.template }}
          
          echo "=== Checking dist-electron/ ==="
          if [ ! -d "dist-electron" ]; then
            echo "FAIL: dist-electron/ not found"
            exit 1
          fi
          
          # 列出所有产物
          find dist-electron/ -type f | head -20
          
          # 检查产物总大小（应 > 10MB）
          TOTAL_SIZE=$(du -sm dist-electron/ | cut -f1)
          echo "Total size: ${TOTAL_SIZE}MB"
          if [ "$TOTAL_SIZE" -lt 10 ]; then
            echo "FAIL: build output too small (${TOTAL_SIZE}MB < 10MB)"
            exit 1
          fi

      - name: Verify macOS DMG
        if: matrix.platform == 'macos'
        run: |
          cd templates/${{ matrix.template }}
          
          # 找到 DMG 文件
          DMG_FILE=$(find dist-electron/ -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "FAIL: No DMG file found"
            exit 1
          fi
          
          echo "DMG: $DMG_FILE"
          DMG_SIZE=$(du -sm "$DMG_FILE" | cut -f1)
          echo "DMG size: ${DMG_SIZE}MB"
          
          # 挂载 DMG 验证结构
          hdiutil attach "$DMG_FILE" -mountpoint /tmp/dmg-verify
          echo "=== DMG contents ==="
          ls -la /tmp/dmg-verify/
          
          # 检查 .app 存在
          APP_NAME=$(find /tmp/dmg-verify/ -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_NAME" ]; then
            echo "FAIL: No .app bundle in DMG"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi
          
          echo "App: $APP_NAME"
          
          # 检查 Info.plist
          PLIST="$APP_NAME/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            echo "=== Info.plist ==="
            plutil -p "$PLIST" | grep -E "CFBundleName|CFBundleIdentifier|CFBundleVersion"
          fi
          
          hdiutil detach /tmp/dmg-verify
          echo "✅ macOS DMG verified"

      - name: Verify Linux AppImage
        if: matrix.platform == 'linux'
        run: |
          cd templates/${{ matrix.template }}
          
          # 找到 AppImage 文件
          APPIMAGE_FILE=$(find dist-electron/ -name "*.AppImage" -type f | head -1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "FAIL: No AppImage file found"
            exit 1
          fi
          
          echo "AppImage: $APPIMAGE_FILE"
          APPIMAGE_SIZE=$(du -sm "$APPIMAGE_FILE" | cut -f1)
          echo "AppImage size: ${APPIMAGE_SIZE}MB"
          
          # 用 xvfb 启动 AppImage 并截图
          chmod +x "$APPIMAGE_FILE"
          
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb scrot > /dev/null 2>&1
          
          XVFB_ARGS="-screen 0 1280x720x24"
          Xvfb :99 $XVFB_ARGS &
          XVFB_PID=$!
          export DISPLAY=:99
          sleep 2
          
          # 启动 AppImage
          "$APPIMAGE_FILE" --no-sandbox &
          APP_PID=$!
          sleep 5
          
          # 截图
          scrot /tmp/electron-screenshot.png
          echo "Screenshot saved"
          
          # 检查窗口是否存在
          if xdotool search --name "Pi Agent" > /dev/null 2>&1; then
            echo "✅ Window found: Pi Agent"
          else
            echo "⚠️ Window not found by name, checking process..."
            if kill -0 $APP_PID 2>/dev/null; then
              echo "✅ App process is running (PID: $APP_PID)"
            else
              echo "FAIL: App process died"
              kill $XVFB_PID 2>/dev/null
              exit 1
            fi
          fi
          
          # 清理
          kill $APP_PID 2>/dev/null
          kill $XVFB_PID 2>/dev/null
          
          # 检查 deb 包
          DEB_FILE=$(find dist-electron/ -name "*.deb" -type f | head -1)
          if [ -n "$DEB_FILE" ]; then
            echo "DEB: $DEB_FILE"
            dpkg-deb -I "$DEB_FILE" | head -10
          fi
          
          echo "✅ Linux build verified"

      - name: Verify Windows exe
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          
          # 找到 exe 文件
          EXE_FILE=$(find dist-electron/ -name "*.exe" -type f | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "FAIL: No exe file found"
            exit 1
          fi
          
          echo "EXE: $EXE_FILE"
          EXE_SIZE=$(du -m "$EXE_FILE" | cut -f1)
          echo "EXE size: ${EXE_SIZE}MB"
          
          if [ "$EXE_SIZE" -lt 10 ]; then
            echo "FAIL: exe too small (${EXE_SIZE}MB)"
            exit 1
          fi
          
          echo "✅ Windows build verified"

      - name: Upload desktop build artifact (${{ matrix.platform }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.template }}
          path: |
            templates/${{ matrix.template }}/dist/
            templates/${{ matrix.template }}/build/
          retention-days: 7

  smoke-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [agent, chat, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Start server and smoke test
        run: |
          cd templates/${{ matrix.template }}

          PORT=$((4000 + RANDOM % 1000))
          AUTH_TOKEN="ci-smoke-test-token" PORT=$PORT bun src/server.ts &
          SERVER_PID=$!

          echo "Waiting for server (PID $SERVER_PID) on port $PORT..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/health" > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Server failed to start within 30s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          echo "=== Health check ==="
          HEALTH=$(curl -s "http://localhost:$PORT/health")
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "FAIL: health check"; kill $SERVER_PID; exit 1; }

          echo "=== Unauthenticated file access (expect 401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT/file/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401"; kill $SERVER_PID; exit 1; }

          echo "=== Authenticated file access (expect 404, not 401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ci-smoke-test-token" "http://localhost:$PORT/file/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" != "401" ] || { echo "FAIL: token auth rejected"; kill $SERVER_PID; exit 1; }

          echo "=== Authenticated info endpoint ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ci-smoke-test-token" "http://localhost:$PORT/info/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" != "401" ] || { echo "FAIL: token auth rejected on /info"; kill $SERVER_PID; exit 1; }

          echo "All smoke tests passed!"
          kill $SERVER_PID

      - name: Cleanup
        if: always()
        run: pkill -f "bun src/server.ts" 2>/dev/null || true

  smoke-hybrid-full:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        template: [agent, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test hybrid mode (IPC + WS + multi-client)
        run: bun scripts/smoke-hybrid-full.ts
        env:
          TEMPLATE: ${{ matrix.template }}

  smoke-desktop-dev:
    runs-on: macos-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test desktop dev mode startup
        run: |
          cd templates/agent
          bun run build
          timeout 30 bun run dev 2>&1 || true
      - name: Verify IPC transport compiles
        run: |
          cd templates/agent
          bunx tsc --noEmit --project tsconfig.ipc.json

      - name: Cleanup
        if: always()
        run: pkill -f "bun src/server.ts" 2>/dev/null || true
