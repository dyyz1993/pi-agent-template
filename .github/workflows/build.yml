name: Build & Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [agent, chat, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        run: |
          cd templates/${{ matrix.template }}
          bun run build

      - name: Verify build output
        run: |
          test -f templates/${{ matrix.template }}/dist/index.html
          test -d templates/${{ matrix.template }}/dist/assets

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ matrix.template }}
          path: templates/${{ matrix.template }}/dist/
          retention-days: 7

  # ── 桌面应用构建（Electrobun 跨平台）────────────────
  # Electrobun 当前主要支持 macOS，Windows/Linux 支持尚在开发中。
  # 使用 continue-on-error: true 容错，等 Electrobun 正式支持后移除。
  # macOS runner 计费是 Linux 的 10 倍，Windows runner 是 Linux 的 10 倍。
  # 本 job 仅在 main 分支或手动触发时运行，避免 PR 消耗过多资源。
  build-desktop:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            template: agent
          - platform: windows
            runner: windows-latest
            template: agent
          - platform: linux
            runner: ubuntu-latest
            template: agent
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend for desktop
        run: |
          cd templates/${{ matrix.template }}
          bun run build

      - name: Install template dependencies
        run: |
          cd templates/${{ matrix.template }}
          bun install

      - name: Build Electron desktop app (macos)
        if: matrix.platform == 'macos'
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:mac
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: Build Electron desktop app (windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:win
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: Build Electron desktop app (linux)
        if: matrix.platform == 'linux'
        run: |
          cd templates/${{ matrix.template }}
          bun run build
          bun run electron:build:linux
          ls -lh dist-electron/ || echo "dist-electron not found"

      - name: List and verify build artifacts (${{ matrix.platform }})
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          
          echo "=== All build artifacts ==="
          find . -maxdepth 3 \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" \) -not -path "*/node_modules/*" 2>/dev/null || true
          
          for dir in dist-electron dist build release; do
            if [ -d "$dir" ]; then
              echo "=== $dir/ ==="
              find "$dir" -type f 2>/dev/null | head -30 || true
              TOTAL_SIZE=$(du -sm "$dir" 2>/dev/null | cut -f1 || echo "0")
              echo "Size: ${TOTAL_SIZE}MB"
            fi
          done

      - name: Verify macOS DMG
        if: matrix.platform == 'macos'
        run: |
          cd templates/${{ matrix.template }}
          
          DMG_FILE=$(find . -name "*.dmg" -type f -not -path "*/node_modules/*" | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "FAIL: No DMG file found"
            exit 1
          fi
          
          echo "DMG: $DMG_FILE"
          DMG_SIZE=$(du -sm "$DMG_FILE" | cut -f1)
          echo "DMG size: ${DMG_SIZE}MB"
          
          hdiutil attach "$DMG_FILE" -mountpoint /tmp/dmg-verify
          echo "=== DMG contents ==="
          ls -la /tmp/dmg-verify/
          
          APP_NAME=$(find /tmp/dmg-verify/ -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_NAME" ]; then
            echo "FAIL: No .app bundle in DMG"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi
          
          echo "App: $APP_NAME"
          
          PLIST="$APP_NAME/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            echo "=== Info.plist ==="
            plutil -p "$PLIST" | grep -E "CFBundleName|CFBundleIdentifier|CFBundleVersion"
          fi
          
          hdiutil detach /tmp/dmg-verify
          echo "✅ macOS DMG verified"

      - name: Verify Linux build
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          
          sudo apt-get update -qq && sudo apt-get install -y -qq libfuse2 xvfb > /dev/null 2>&1
          
          APPIMAGE_FILE=$(find . -name "*.AppImage" -type f -not -path "*/node_modules/*" | head -1)
          if [ -n "$APPIMAGE_FILE" ]; then
            echo "AppImage: $APPIMAGE_FILE"
            chmod +x "$APPIMAGE_FILE"
            
            xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
              timeout 10 "$APPIMAGE_FILE" --no-sandbox 2>&1 || true
            echo "✅ AppImage launched successfully"
          else
            echo "⚠️ No AppImage found, checking deb..."
          fi
          
          DEB_FILE=$(find . -name "*.deb" -type f -not -path "*/node_modules/*" | head -1)
          if [ -n "$DEB_FILE" ]; then
            echo "DEB: $DEB_FILE"
            dpkg-deb -I "$DEB_FILE"
            echo "✅ DEB package verified"
          fi

      - name: Verify Windows build
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd templates/${{ matrix.template }}
          
          EXE_FILE=$(find . -name "*.exe" -type f -not -path "*/node_modules/*" | head -1)
          if [ -n "$EXE_FILE" ]; then
            echo "EXE: $EXE_FILE"
            wc -c < "$EXE_FILE"
            echo "✅ Windows exe verified"
          else
            echo "⚠️ No exe found"
          fi

      - name: Upload desktop build artifact (${{ matrix.platform }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.template }}
          path: |
            templates/${{ matrix.template }}/dist/
            templates/${{ matrix.template }}/build/
          retention-days: 7

  smoke-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [agent, chat, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Start server and smoke test
        run: |
          cd templates/${{ matrix.template }}

          PORT=$((4000 + RANDOM % 1000))
          AUTH_TOKEN="ci-smoke-test-token" PORT=$PORT bun src/server.ts &
          SERVER_PID=$!

          echo "Waiting for server (PID $SERVER_PID) on port $PORT..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/health" > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Server failed to start within 30s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          echo "=== Health check ==="
          HEALTH=$(curl -s "http://localhost:$PORT/health")
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "FAIL: health check"; kill $SERVER_PID; exit 1; }

          echo "=== Unauthenticated file access (expect 401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT/file/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" = "401" ] || { echo "FAIL: expected 401"; kill $SERVER_PID; exit 1; }

          echo "=== Authenticated file access (expect 404, not 401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ci-smoke-test-token" "http://localhost:$PORT/file/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" != "401" ] || { echo "FAIL: token auth rejected"; kill $SERVER_PID; exit 1; }

          echo "=== Authenticated info endpoint ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ci-smoke-test-token" "http://localhost:$PORT/info/test.txt")
          echo "HTTP $STATUS"
          [ "$STATUS" != "401" ] || { echo "FAIL: token auth rejected on /info"; kill $SERVER_PID; exit 1; }

          echo "All smoke tests passed!"
          kill $SERVER_PID

      - name: Cleanup
        if: always()
        run: pkill -f "bun src/server.ts" 2>/dev/null || true

  smoke-hybrid-full:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        template: [agent, general]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test hybrid mode (IPC + WS + multi-client)
        run: bun scripts/smoke-hybrid-full.ts
        env:
          TEMPLATE: ${{ matrix.template }}

  smoke-desktop-dev:
    runs-on: macos-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test desktop dev mode startup
        run: |
          cd templates/agent
          bun run build
          timeout 30 bun run dev 2>&1 || true
      - name: Verify IPC transport compiles
        run: |
          cd templates/agent
          bunx tsc --noEmit --project tsconfig.ipc.json

      - name: Cleanup
        if: always()
        run: pkill -f "bun src/server.ts" 2>/dev/null || true
