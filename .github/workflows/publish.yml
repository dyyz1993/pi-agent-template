name: Publish to npm

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
      - 'cli-v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish-rpc-core:
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/v-cli')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(jq -r .version packages/rpc-core/package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: bun run test:rpc

      - name: Install template dependencies
        run: cd templates/agent && bun install

      - name: Run agent template tests
        run: cd templates/agent && npx vitest run

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > packages/rpc-core/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        working-directory: packages/rpc-core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pi-cli:
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/cli-v}"
          PKG_VERSION=$(jq -r .version packages/pi-cli/package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile

      - name: Run tests
        run: bun run test:rpc

      - name: Sync templates
        run: |
          for t in general chat agent; do
            rm -rf packages/pi-cli/templates/$t
            cp -r templates/$t packages/pi-cli/templates/$t
          done

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > packages/pi-cli/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        working-directory: packages/pi-cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
