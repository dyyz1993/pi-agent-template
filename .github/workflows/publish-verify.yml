name: Publish Verify

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Publish to npm"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      template:
        description: 'Template to verify (agent, chat, general, all)'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  determine-templates:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      templates: ${{ steps.set.outputs.templates }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event.inputs.template }}" = "all" ] || [ -z "${{ github.event.inputs.template }}" ]; then
            echo 'templates=["agent","chat","general"]' >> $GITHUB_OUTPUT
          else
            echo 'templates=["${{ github.event.inputs.template }}"]' >> $GITHUB_OUTPUT
          fi

  verify-npm-package:
    needs: determine-templates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.determine-templates.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Verify npm package (${{ matrix.template }})
        run: bun run scripts/verify-npm-package.ts ${{ matrix.template }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-verify-${{ matrix.template }}
          path: /tmp/npm-verify-${{ matrix.template }}-*
          retention-days: 3

  notify-result:
    runs-on: ubuntu-latest
    needs: [verify-npm-package]
    if: always()
    steps:
      - name: Check result
        id: check
        run: |
          if [ "${{ needs.verify-npm-package.result }}" = "failure" ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Bark notification
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          STATUS="${{ steps.check.outputs.status }}"
          if [ "$STATUS" = "FAILED" ]; then
            TITLE="npm%E9%AA%8C%E8%AF%81%E5%A4%B1%E8%B4%A5%E2%9D%8C"
          else
            TITLE="npm%E9%AA%8C%E8%AF%81%E9%80%9A%E8%BF%87%E2%9C%85"
          fi
          MSG="${TITLE}%20${GITHUB_REPOSITORY}%20${RUN_URL}"
          curl -s "https://api.day.app/PpdrqL9LsYaJc83YW5ZQj5/${MSG}" || true

  feishu-notify:
    name: Feishu Notification
    if: always()
    needs: [verify-npm-package, notify-result]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"verify-npm-package":"${{ needs.verify-npm-package.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
