stages:
  - lint
  - type-check
  - test
  - build-verify
  - integration-test
  - e2e-ui

variables:
  BUN_VERSION: "latest"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .pnpm-store/

.before_bun: &before_bun
  - apt-get update -qq && apt-get install -y -qq curl unzip
  - curl -fsSL https://bun.sh/install | bash
  - export PATH="$HOME/.bun/bin:$PATH"
  - bun --version

lint:
  stage: lint
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run lint
    - |
      for t in general chat agent; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        bun run lint
      done

type-check:
  stage: type-check
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run type-check
    - |
      for t in general chat agent; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
          exit 1
        fi
        echo "Template $t type check passed"
      done

test-rpc:
  stage: test
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run test:rpc

test-templates:
  stage: test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - |
      for t in agent chat general; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        npx vitest run
      done

build-verify-general:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-general --type general
    - test -f /tmp/ci-test-general/package.json

build-verify-chat:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-chat --type chat
    - test -f /tmp/ci-test-chat/package.json

build-verify-agent:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-agent --type agent
    - test -f /tmp/ci-test-agent/package.json

integration-test-general:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type general

integration-test-chat:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type chat

integration-test-agent:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type agent

e2e-ui-general:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts general

e2e-ui-chat:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts chat

e2e-ui-agent:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts agent
  artifacts:
    when: always
    paths:
      - e2e-ui-results/
    expire_in: 7 days

notify-result:
  stage: .post
  image: alpine:latest
  when: always
  script:
    - apk add --no-cache curl
    - |
      BRANCH="${CI_COMMIT_BRANCH:-unknown}"
      PIPELINE_URL="${CI_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}"
      STATUS="PASSED"
      if [ "$CI_PIPELINE_STATUS" = "failed" ] || [ "$CI_JOB_STATUS" = "failed" ]; then
        STATUS="FAILED"
      fi
      if [ "$STATUS" = "FAILED" ]; then
        TITLE="GitLab%20CI%E5%A4%B1%E8%B4%A5%E2%9D%8C"
      else
        TITLE="GitLab%20CI%E9%80%9A%E8%BF%87%E2%9C%85"
      fi
      MSG="${TITLE}%20${CI_PROJECT_NAME}%20${BRANCH}%20${PIPELINE_URL}"
      curl -s "https://api.day.app/PpdrqL9LsYaJc83YW5ZQj5/${MSG}" || true
  allow_failure: true
