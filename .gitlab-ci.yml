stages:
  - lint
  - type-check
  - test
  - build-verify
  - integration-test
  - rpc-api-test
  - e2e-ui

variables:
  BUN_VERSION: "latest"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .pnpm-store/

.before_bun: &before_bun
  - apt-get update -qq && apt-get install -y -qq curl unzip
  - curl -fsSL https://bun.sh/install | bash
  - export PATH="$HOME/.bun/bin:$PATH"
  - bun --version

lint:
  stage: lint
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run lint
    - |
      for t in general chat agent; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        bun run lint
      done

type-check:
  stage: type-check
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run type-check
    - |
      for t in general chat agent; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "node_modules" || true)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
          exit 1
        fi
        echo "Template $t type check passed"
      done

test-rpc:
  stage: test
  image: node:22-slim
  before_script:
    - *before_bun
    - npm install -g pnpm@9
    - pnpm install --frozen-lockfile
  script:
    - bun run test:rpc

test-pi-cli:
  stage: test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - cd packages/pi-cli && bun test src/__tests__/

test-templates:
  stage: test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - |
      for t in agent chat general; do
        cd $CI_PROJECT_DIR/templates/$t
        bun install
        npx vitest run
      done

build-verify-general:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-general --type general
    - |
      cd /tmp/ci-test-general
      echo "=== Checking project structure ==="
      test -f package.json || (echo "FAIL: package.json missing" && exit 1)
      test -f src/server.ts || (echo "FAIL: src/server.ts missing" && exit 1)
      test -f src/mainview/main.tsx || (echo "FAIL: src/mainview/main.tsx missing" && exit 1)
      test -f vite.config.ts || (echo "FAIL: vite.config.ts missing" && exit 1)
      echo "=== Project structure OK ==="
    - cd /tmp/ci-test-general && bun install
    - cd /tmp/ci-test-general && npx vite build
    - |
      cd /tmp/ci-test-general
      echo "=== Checking build output ==="
      test -d dist || (echo "FAIL: dist/ directory missing" && exit 1)
      test -f dist/index.html || (echo "FAIL: dist/index.html missing" && exit 1)
      echo "=== Build output OK ==="
      echo "=== Build artifacts ==="
      du -sh dist/
      du -sh dist/assets/*

build-verify-chat:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-chat --type chat
    - |
      cd /tmp/ci-test-chat
      echo "=== Checking project structure ==="
      test -f package.json || (echo "FAIL: package.json missing" && exit 1)
      test -f src/server.ts || (echo "FAIL: src/server.ts missing" && exit 1)
      test -f src/mainview/main.tsx || (echo "FAIL: src/mainview/main.tsx missing" && exit 1)
      test -f vite.config.ts || (echo "FAIL: vite.config.ts missing" && exit 1)
      echo "=== Project structure OK ==="
    - cd /tmp/ci-test-chat && bun install
    - cd /tmp/ci-test-chat && npx vite build
    - |
      cd /tmp/ci-test-chat
      echo "=== Checking build output ==="
      test -d dist || (echo "FAIL: dist/ directory missing" && exit 1)
      test -f dist/index.html || (echo "FAIL: dist/index.html missing" && exit 1)
      echo "=== Build output OK ==="
      echo "=== Build artifacts ==="
      du -sh dist/
      du -sh dist/assets/*

build-verify-agent:
  stage: build-verify
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/create.ts ci-test /tmp/ci-test-agent --type agent
    - |
      cd /tmp/ci-test-agent
      echo "=== Checking project structure ==="
      test -f package.json || (echo "FAIL: package.json missing" && exit 1)
      test -f src/server.ts || (echo "FAIL: src/server.ts missing" && exit 1)
      test -f src/mainview/main.tsx || (echo "FAIL: src/mainview/main.tsx missing" && exit 1)
      test -f vite.config.ts || (echo "FAIL: vite.config.ts missing" && exit 1)
      echo "=== Project structure OK ==="
    - cd /tmp/ci-test-agent && bun install
    - cd /tmp/ci-test-agent && npx vite build
    - |
      cd /tmp/ci-test-agent
      echo "=== Checking build output ==="
      test -d dist || (echo "FAIL: dist/ directory missing" && exit 1)
      test -f dist/index.html || (echo "FAIL: dist/index.html missing" && exit 1)
      echo "=== Build output OK ==="
      echo "=== Build artifacts ==="
      du -sh dist/
      du -sh dist/assets/*

integration-test-general:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type general

integration-test-chat:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type chat

integration-test-agent:
  stage: integration-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/e2e-test.ts --type agent

rpc-api-test-general:
  stage: rpc-api-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/rpc-api-ci-test.ts --type general

rpc-api-test-chat:
  stage: rpc-api-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/rpc-api-ci-test.ts --type chat

rpc-api-test-agent:
  stage: rpc-api-test
  image: node:22-slim
  before_script:
    - *before_bun
  script:
    - HUSKY=0 bun run scripts/rpc-api-ci-test.ts --type agent

e2e-ui-general:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts general

e2e-ui-chat:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts chat

e2e-ui-agent:
  stage: e2e-ui
  image: node:22-slim
  before_script:
    - *before_bun
    - npx playwright install --with-deps chromium
  script:
    - bun install
    - HUSKY=0 bun run scripts/e2e-ui-test.ts agent
  artifacts:
    when: always
    paths:
      - e2e-ui-results/
    expire_in: 7 days

notify-result:
  stage: .post
  image: alpine:latest
  when: always
  script:
    - apk add --no-cache curl
    - |
      BRANCH="${CI_COMMIT_BRANCH:-unknown}"
      PIPELINE_URL="${CI_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}"
      STATUS="PASSED"
      if [ "$CI_PIPELINE_STATUS" = "failed" ] || [ "$CI_JOB_STATUS" = "failed" ]; then
        STATUS="FAILED"
      fi
      if [ "$STATUS" = "FAILED" ]; then
        TITLE="GitLab%20CI%E5%A4%B1%E8%B4%A5%E2%9D%8C"
      else
        TITLE="GitLab%20CI%E9%80%9A%E8%BF%87%E2%9C%85"
      fi
      MSG="${TITLE}%20${CI_PROJECT_NAME}%20${BRANCH}%20${PIPELINE_URL}"
      curl -s "https://api.day.app/PpdrqL9LsYaJc83YW5ZQj5/${MSG}" || true
  allow_failure: true
