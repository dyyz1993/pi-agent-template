# Module: chat
# Interaction patterns for ChatPanel
# Version: 3
# Last updated: 2026-05-03
# Updated in round: r3

send_chat_message:
  description: "Send a message via the chat input and verify response"
  steps:
    - action: fill
      selector: "input[placeholder='Type a message...']"  # NOTE: <input> not <textarea>
      description: "Type message into chat input field"
    - action: click
      selector: "button"  # Send button
      description: "Click Send button to submit"
    - action: wait
      duration_ms: 2000
      description: "Wait for RPC response (bot reply)"
    - action: eval
      code: "document.body.innerText"
      description: "Extract full page text to verify messages appeared"
  expected_result: "User message and bot response appear in chat area, Messages counter increments by 2"

send_via_eval:
  description: "Programmatic message sending via eval (more reliable when session is unstable)"
  code: |
    var input = document.querySelector('input[placeholder]');
    var sendBtn = document.evaluate('//button[text()="Send"]', document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
    var setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
    setter.call(input, 'message text');
    input.dispatchEvent(new Event('input', { bubbles: true }));
    sendBtn.click();
  note: "Use this when snapshot/fill/click commands break the session"

verify_chat_messages:
  description: "Chat messages are NOT visible in snapshot -i accessibility tree. Must use eval to extract."
  extraction_method: "eval document.body.innerText or eval document.getElementById('root').innerHTML"
  pattern: "Look for 'Messages' line, then next line is the count number"

verify_scroll_position:
  description: "Check if chat is auto-scrolled to bottom"
  code: "document.querySelector('.overflow-y-auto').scrollTop + clientHeight >= scrollHeight - 50"
  note: "scrollTop + clientHeight should equal scrollHeight when at bottom"

bot_responses:
  description: "The chat handler is a smart demo assistant with contextual replies"
  known_responses:
    hi: "Hello! Great to see you. What would you like to know?"
    hello: "Hello! Great to see you. What would you like to know?"
    time_query: "It's currently HH:MM AM/PM on Day, Month DD, YYYY."
    math_query: "That would be [result]! Need help with anything else?"
    help: "Here's what I can help with: [lists Greetings, Time & Date, Math, Help]"
    unknown: "Hmm, I'm not sure about that one. But I can do math and tell you the time."
    generic_unknown: "That's an interesting question! I'm a demo assistant..."
    unrecognized: "I wish I could help with that! For now I can answer questions about time and do simple math."
  capabilities:
    - "Greetings (hi, hello)"
    - "Time & Date queries"
    - "Simple math (multiplication, division)"
    - "Help command"
  notes: "Bot does NOT handle: file browsing, git commands, complex topics. Returns fallback for unsupported queries."

layout:
  description: "Responsive chat-focused layout"
  desktop:
    title_bar: "h-8 bg-gray-800 with WS badge + Pi Chat subtitle"
    activity_bar: "w-12 left sidebar with 1 icon (Chat)"
    main_area: "Messages header + message list + input area"
  mobile:
    no_title_bar: true
    no_activity_bar: true
    bottom_tab_bar: "h-14 with Chat icon"
    breakpoint: "< 768px (mobile), 768-1024 (tablet), >= 1024 (desktop)"
  responsive_hook: "useBreakpointSync() in App.tsx, uses ResizeObserver"

responsive_testing:
  description: "How to test responsive layout with agent-browser"
  steps:
    - action: set viewport
      command: "agent-browser set viewport 375 667"
      note: "CAUTION: This causes page to go blank! Must re-open page after viewport change"
    - action: open
      command: "agent-browser open http://localhost:5180"
      note: "Wait 10+ seconds for React + WebSocket to fully initialize"
    - action: eval
      description: "Verify layout in single eval (session unstable after viewport change)"
  critical_issue: "set viewport causes page blank - must re-open and wait 10s"

ws_connection:
  description: "WebSocket auto-connects through Vite proxy"
  auto_connect: true
  badge_shows: "Web (WebSocket) in blue pill badge"
  page_load_time: "8-10 seconds for full initialization including message history"

tips:
  - "snapshot -i does NOT show chat message content - accessibility tree omits them"
  - "Use eval document.body.innerText or root.innerHTML to extract messages"
  - "The message input is an <input> element, NOT a <textarea>"
  - "Messages counter is on separate line after 'Messages' text"
  - "ActivityBar has ONLY the Chat icon — focused chat-only template"
  - "WS connects automatically via Vite proxy — no ?ws= URL param needed"
  - "Bot responses include markdown formatting (bold, lists, paragraphs)"
  - "User messages: right-aligned, bg-indigo-600 (rgb(79,70,229))"
  - "Bot messages: left-aligned, bg-gray-700 (rgb(55,65,81)), with bot SVG icon"
  - "Timestamps in HH:MM 24h format"
  - "Page needs 8-10 seconds to fully load (WebSocket + message history)"
  - "set viewport command breaks session - must re-open page after"
  - "Session is unstable: second eval call often returns about:blank - use single comprehensive eval per open"
  - "Prefer sending messages via eval with native value setter + click instead of fill/click when session is fragile"
  - "Bot does NOT support file browsing or git commands - returns fallback responses"
