critical_bug_cross_wiring:
  description: "Backend processes are cross-wired — CWD doesn't match expected instance"
  discovered: "2026-04-30"
  mapping:
    backend_3100_cwd: "/private/tmp/iso-test/iso-3"  # Expected iso-1!
    backend_3101_cwd: "/private/tmp/iso-test/iso-2"  # Correct
    backend_3102_cwd: "/private/tmp/iso-test/iso-1"  # Expected iso-3!
  effect: "Auth token mismatch causes WS 4001 Unauthorized for iso-1 and iso-3"
  workaround: "Set AUTH_TOKEN env var explicitly when starting backends"

pi_agent_template_selectors:
  description: "Selectors for pi-agent-template (all instances same UI)"
  title_bar: "Shows 'Web (WebSocket)Iso-N' when connected"
  chat_button: "button[title='Chat']"
  chat_textarea: "textarea[placeholder='Type a message...']"
  send_button: "button with text 'Send'"
  explorer_button: "button[title='Explorer']"
  rpc_dropdown: "combobox with options: system.ping, system.hello, system.echo, chat.send"
  call_button: "button with text 'Call'"
  subscribe_button: "button with text 'Subscribe'"
  logs_section: "Logs area at bottom"

ws_auth_flow:
  description: "WS authentication flow"
  frontend_connects: "ws://{host}/ws?token={AUTH_TOKEN}"
  vite_proxy: "/ws → ws://localhost:{backendPort} (ws: true)"
  backend_check: "ws-handler.ts compares url.searchParams.get('token') vs cfg.authToken"
  failure_code: "4001 'Unauthorized'"
  success_indicator: "backend /health returns clients > 0"
